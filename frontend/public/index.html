<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Docker Compose Application - Interface moderne" />
    
    <title>Docker Compose App</title>
    
    <!-- Tailwind CSS CDN (pour un design rapide et beau) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .tail-container {
            display: none; /* Masqué par défaut, React va tout gérer */
        }
        
        /* Loading Screen */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }
        
        .docker-icon {
            animation: spin 2s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    
    <!-- Loading Screen (joli) -->
    <div id="loading-screen" class="loading-screen">
        <div class="text-center">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center docker-icon shadow-2xl">
                    <span class="text-white text-3xl font-bold">🐳</span>
                </div>
            </div>
            <h1 class="text-3xl font-semibold tracking-tight mb-2">Docker Compose App</h1>
            <p class="text-slate-400">Chargement de l'application...</p>
            
            <!-- Barre de progression animée -->
            <div class="w-64 h-1 bg-slate-800 rounded-full mx-auto mt-8 overflow-hidden">
                <div class="h-full w-1/3 bg-blue-500 rounded-full animate-[loading_1.5s_infinite_linear]"></div>
            </div>
        </div>
    </div>

    <!-- Container principal où React va monter -->
    <div id="root" class="tail-container min-h-screen"></div>

    <noscript>
        <div class="fixed inset-0 flex items-center justify-center bg-slate-950 text-white text-center p-8">
            <div>
                <h2 class="text-2xl font-semibold mb-4">JavaScript est requis</h2>
                <p class="text-slate-400 max-w-md mx-auto">
                    Pour profiter pleinement de cette application Docker Compose, veuillez activer JavaScript dans votre navigateur.
                </p>
            </div>
        </div>
    </noscript>

    <script>
        // Configuration Tailwind
        tailwind.config = {
            content: [],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }

        // Masquer le loading screen une fois React chargé (optionnel)
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading-screen');
                if (loading) {
                    loading.style.opacity = '0';
                    setTimeout(() => {
                        loading.style.display = 'none';
                        document.getElementById('root').classList.remove('tail-container');
                    }, 600);
                }
            }, 800);
        });
    </script>
</body>
</html>
